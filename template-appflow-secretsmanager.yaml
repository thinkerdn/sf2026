AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Salesforce AppFlow Custom Connector with Secrets Manager
  Client Credentials方式でSalesforceに接続するAppFlowカスタムコネクタ
  認証情報はAWS Secrets Managerから取得

Parameters:
  SecretName:
    Type: String
    Default: salesforce/client-credentials
    Description: Secrets Managerのシークレット名
  
  FunctionName:
    Type: String
    Default: salesforce-appflow-connector-sm
    Description: Lambda関数名

Globals:
  Function:
    Timeout: 30
    MemorySize: 256
    Runtime: python3.11

Resources:
  SalesforceAppFlowConnectorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Ref FunctionName
      CodeUri: .
      Handler: lambda_appflow_connector_secretsmanager.lambda_handler
      Description: Salesforce AppFlow Custom Connector with Secrets Manager
      Environment:
        Variables:
          SECRET_NAME: !Ref SecretName
          AWS_REGION: !Ref AWS::Region
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${SecretName}*'
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${FunctionName}:*'
      Tags:
        Application: SalesforceAppFlowConnector
        Environment: Production
        ManagedBy: SAM

  # Lambda関数のログループ
  SalesforceAppFlowConnectorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${FunctionName}'
      RetentionInDays: 7

  # AppFlowがLambda関数を呼び出すための権限
  AppFlowInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref SalesforceAppFlowConnectorFunction
      Action: lambda:InvokeFunction
      Principal: appflow.amazonaws.com
      SourceAccount: !Ref AWS::AccountId

Outputs:
  SalesforceAppFlowConnectorFunctionArn:
    Description: Lambda関数のARN
    Value: !GetAtt SalesforceAppFlowConnectorFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-FunctionArn'
  
  SalesforceAppFlowConnectorFunctionName:
    Description: Lambda関数名
    Value: !Ref SalesforceAppFlowConnectorFunction
    Export:
      Name: !Sub '${AWS::StackName}-FunctionName'
  
  SecretNameUsed:
    Description: 使用しているSecretsManagerのシークレット名
    Value: !Ref SecretName
    Export:
      Name: !Sub '${AWS::StackName}-SecretName'
